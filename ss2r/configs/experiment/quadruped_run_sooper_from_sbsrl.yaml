# @package _global_
defaults:
  #- mujoco_playground_dm_control
  - override /environment: quadruped
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - override /agent/cost_robustness: pessimistic_cost_update
  - override /agent/penalizer: lagrangian
  - _self_


training:
  num_timesteps: 50000
  safe: true
  train_domain_randomization: false
  eval_domain_randomization: false
  safety_budget: 100
  num_envs: 1
  num_evals: 20
  wandb_id: fkgkotz3 #,z4txn8kg,hpwad9az,uxwvfeu2,nsn5ktly

agent:
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  model_hidden_layer_sizes: [400, 400, 400, 400]
  activation: swish
  #reset_on_eval: false
  batch_size: 256
  min_replay_size: 2000
  max_replay_size: 1048576
  critic_grad_updates_per_step: 2000
  model_grad_updates_per_step: 1000
  num_model_rollouts: 100000
  learning_rate: 1e-6
  critic_learning_rate: 5e-5
  num_critic_updates_per_actor_update: 20
  model_learning_rate: 1e-4

  model_to_real_data_ratio: 0.5

  safety_discounting: 0.999
  normalize_budget: false

  penalizer:
    lagrange_multiplier: 1
    penalty_multiplier: 0.001
    penalty_multiplier_factor: 1e-4

  pessimism: 0
  optimism: 0

  model_propagation: first
  cost_robustness: null
  use_termination: false
  safety_filter: sooper
  load_from_sbsrl: true
  advantage_threshold: null
  load_auxiliaries: true


