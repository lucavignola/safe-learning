# @package _global_
defaults:
  - override /environment: rccar_real
  - override /agent: sbsrl
  - override /agent/data_collection: hardware
  #- override /agent/cost_robustness: pessimistic_cost_update
  - override /agent/penalizer: multiaug_lagrangian
  - _self_

environment:
  action_delay: 1
  observation_delay: 0
  sliding_window: 5
  dt: 0.03333333
  sample_init_pose: false

training:
  num_envs: 1
  num_timesteps: 25000
  episode_length: 250
  safe: true
  train_domain_randomization: false
  eval_domain_randomization: false
  safety_budget: 5.
  wandb_id: 1ngbzvbk
  render: false

agent:
  batch_size: 256
  min_replay_size: 2500
  max_replay_size: 1048576
  policy_hidden_layer_sizes: [64, 64]
  critic_grad_updates_per_step: 4000
  model_grad_updates_per_step: 50000
  num_model_rollouts: 100000
  learning_rate: 1e-5
  critic_learning_rate: 1e-5
  model_learning_rate: 3e-4


  penalizer:
    lagrange_multiplier: 1
    penalty_multiplier: 0.001
    penalty_multiplier_factor: 1e-4


  data_collection:
    address: tcp://169.254.211.241:5555
    wait_time_sec: 60


  normalize_budget: true
  use_mean_critic: false
  uncertainty_constraint: true
  flip_uncertainty_constraint: false
  uncertainty_epsilon: 0
  cost_scaling: 1
  reward_scaling: 1
  model_to_real_data_ratio: 1
  reward_pessimism: 0
  cost_pessimism: 0.
  normalize_disagreement: true
  separate_critics: true

