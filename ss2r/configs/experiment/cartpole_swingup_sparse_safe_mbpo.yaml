# @package _global_
defaults:
  - override /environment: cartpole_swingup
  - override /agent: mbpo
  - override /agent/data_collection: episodic
  - override /agent/penalizer: lagrangian
  - _self_

environment:
  task_name: BothCartpoleSwingup
  task_params:
    action_cost_scale: 0.2

training:
  num_timesteps: 896000
  safe: true
  num_envs: 10
  train_domain_randomization: false
  eval_domain_randomization: false
  safety_budget: 100
  num_evals: 15
  num_eval_envs: 128
  render: false
  wandb_id: vy32nbw2 #,2tthiu0u,8eco0qql,jqpm5u37,ndt75g5x

agent:
  activation: swish
  policy_hidden_layer_sizes: [256, 256, 256]
  value_hidden_layer_sizes: [512, 512]
  batch_size: 256
  max_replay_size: 1000000
  model_to_real_data_ratio: 0.1
  min_replay_size: 8192
  sac_batch_size: 256
  critic_grad_updates_per_step: 4000
  model_grad_updates_per_step: 1000
  num_model_rollouts: 100000
  num_critic_updates_per_actor_update: 1
  penalizer:
    lagrange_multiplier: 2.5
    penalty_multiplier: 1e-3
    penalty_multiplier_factor: 1e-4

  pessimism: 50 #or 0 for higher rewards but more violations
  optimism: 0

  cost_robustness: null
  use_termination: false
  safety_filter: null
  load_from_sbsrl: true
  advantage_threshold: null
  load_auxiliaries: true
